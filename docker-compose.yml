version: "3.8"

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  receiver-service:
    build:
      context: .
      target: receiver-service
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
      - redis
    environment:
      - MONGO_URI=mongodb://mongodb:27017/user_db
      - REDIS_URL=redis://redis:6379
      - PORT=3000

  listener-service:
    build:
      context: .
      target: listener-service
    depends_on:
      - mongodb
      - redis
    environment:
      - MONGO_URI=mongodb://mongodb:27017/user_db
      - REDIS_URL=redis://redis:6379

volumes:
  mongodb_data:
  redis_data:
